name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run ASKILL validation and build ZIP
        shell: powershell
        run: .\package.ps1

      - name: Upload plugin ZIP
        uses: actions/upload-artifact@v4
        with:
          name: bpa-analytics-cowork-zip
          path: bpa-analytics-cowork.zip
          if-no-files-found: error
